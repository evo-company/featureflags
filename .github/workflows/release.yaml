name: Build & publish

on:
  push:
    tags:
    - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        python-version: [3.11]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install lets
      uses: lets-cli/lets-action@v1.1

    - name: Set up Node
      uses: actions/setup-node@v4.0.1
      with:
        node-version: 20
        cache-dependency-path: ./ui/package-lock.json
        cache: 'npm'

    - name: Install dependencies
      working-directory: ./ui
      run: npm install

    - name: Build UI and copy bundle
      working-directory: ./ui
      run: npm run build -- --outDir ../featureflags/web/static

    - name: Set up Python with PDM ${{ matrix.python-version }}
      uses: pdm-project/setup-pdm@v3
      with:
        python-version: ${{ matrix.python-version }}
        version: 2.18.0

    - name: Upload package to pypi.org
      run: pdm publish -u "__token__" -P ${{ secrets.PYPI_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION="${TAG#v}"

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release $TAG already exists, skipping"
          exit 0
        fi

        # Extract this version's section from CHANGELOG.md
        awk -v ver="$VERSION" '
          /^## \[/ { if (found) exit; if (index($0, "## [" ver "]") == 1) found = 1; next }
          found { print }
        ' CHANGELOG.md > /tmp/notes.md

        ARGS=(--title "$TAG" --verify-tag)

        # PEP 440 pre-releases (rc/a/b/dev suffixes) are not plain X.Y.Z
        if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
          ARGS+=(--prerelease)
        fi

        if grep -q '[^[:space:]]' /tmp/notes.md; then
          ARGS+=(--notes-file /tmp/notes.md)
        else
          ARGS+=(--generate-notes)
        fi

        gh release create "$TAG" "${ARGS[@]}"
